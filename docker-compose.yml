version: "3"
services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile-prod
    environment:
      - DB_HOST=mongo
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - mongo
      - elasticsearch
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DB_HOST=mongo
    volumes:
      - ./src:/usr/src/nijobs-be/src
    depends_on:
      - mongo
      - elasticsearch
  test:
    build:
      context: .
      dockerfile: Dockerfile-test
    environment:
      - DB_HOST=mongo
    volumes:
      - ./src:/usr/src/nijobs-be/src
      - ./test:/usr/src/nijobs-be/test
    depends_on:
      - mongo
  mongo:
    image: mongo
    ports:
      - "27017:27017"
  elasticsearch:
    image: elasticsearch:7.6.1
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
